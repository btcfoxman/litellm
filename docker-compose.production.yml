version: "3.9"

services:
  litellm:
    image: registry.cn-shenzhen.aliyuncs.com/epur/litellm:${IMAGE_TAG:-latest}
    container_name: litellm
    restart: unless-stopped
    command:
      - "--port"
      - "4000"
      - "--config"
      - "/app/litellm-config.yaml"
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://llmproxy:${POSTGRES_PASSWORD:-dbpassword9090}@db:5432/litellm}"
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./litellm-config.prod.yaml:/app/litellm-config.yaml:ro
    depends_on:
      - db
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16
    container_name: litellm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dbpassword9090}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 1s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"

volumes:
  prometheus_data:
    driver: local
  postgres_data:
    name: litellm_postgres_data
