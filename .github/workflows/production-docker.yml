name: Build & Push Production Docker Image
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  USER_NAME: btcfoxman
  IMAGE_NAME: litellm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Guangzhou
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          data = Path('pyproject.toml').read_text(encoding='utf-8')
          m = re.search(r"^version\s*=\s*['\"]([^'\"]+)['\"]", data, re.M)
          if not m:
              raise SystemExit('version not found in pyproject.toml')
          version = m.group(1)
          output = os.environ.get("GITHUB_OUTPUT")
          if output:
              with open(output, "a", encoding="utf-8") as fh:
                  fh.write(f"version={version}\n")
          print(f"version={version}")
          PY

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.USER_NAME }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}
            registry.cn-shenzhen.aliyuncs.com/epur/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          DEPLOY_SERVICE: ${{ secrets.DEPLOY_SERVICE }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: DEPLOY_PATH,GHCR_TOKEN,GHCR_USERNAME,DEPLOY_SERVICE
          script: |
            set -e
            cd $DEPLOY_PATH
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose pull $DEPLOY_SERVICE
            docker compose up -d $DEPLOY_SERVICE
